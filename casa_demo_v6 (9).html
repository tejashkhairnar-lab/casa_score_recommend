<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight Fintech · CASA Intelligence Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Knight Fintech — light theme: white bg, navy text, orange accent */
  --bg:#F4F6F9;--surf:#FFFFFF;--card:#FFFFFF;--card2:#F8F9FC;
  --bdr:#E2E8F0;--bdr2:#CBD5E1;
  --navy:#0F2D52;--navy2:#1A3F70;
  --gold:#F47B20;--goldl:#FF9245;--goldb:rgba(244,123,32,0.09);--goldbl:rgba(244,123,32,0.16);
  --tx:#0F2D52;--mu:#64748B;--di:#CBD5E1;
  --gr:#0D7A4E;--grb:rgba(13,122,78,0.08);
  --tl:#0369A1;--tlb:rgba(3,105,161,0.08);
  --am:#B45309;--amb:rgba(180,83,9,0.08);
  --re:#B91C1C;--reb:rgba(185,28,28,0.08);
  --pu:#5B21B6;--pub:rgba(91,33,182,0.08);
  --bl:#1D4ED8;--blb:rgba(29,78,216,0.08);
  --fn:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:8px;--rl:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:13px;line-height:1.5}
#app{position:relative;height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{height:52px;border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--navy);flex-shrink:0;gap:14px}
.logo{font-family:var(--fn);font-weight:800;font-size:11px;color:#FFFFFF;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px;white-space:nowrap}
.lgem{width:16px;height:16px;background:var(--gold);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);flex-shrink:0}
.logo-sep{width:1px;height:20px;background:rgba(15,45,82,0.14)}
.ppills{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.ppills::-webkit-scrollbar{display:none}
.pp{cursor:pointer;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.55);background:transparent;border:1px solid rgba(15,45,82,0.12);transition:all .15s;white-space:nowrap;font-family:var(--fb)}
.pp:hover{border-color:rgba(255,255,255,0.4);color:#FFF}
.pp.act{background:var(--gold);border-color:var(--gold);color:#FFFFFF}
.steplbl{font-size:9px;font-family:var(--fn);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);white-space:nowrap}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .25s ease;display:flex;flex-direction:column}
.screen.act{opacity:1;pointer-events:all}
.scrl{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.scrl::-webkit-scrollbar{width:3px}
.scrl::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── FOOTER ── */
#ftr{height:50px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--surf);flex-shrink:0;box-shadow:0 -1px 0 var(--bdr)}
.btn{cursor:pointer;padding:8px 18px;border-radius:var(--r);font-size:11px;font-weight:600;border:1px solid var(--bdr2);background:var(--surf);color:var(--mu);transition:all .15s;font-family:var(--fb);display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg);border-color:var(--navy);color:var(--navy)}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn.pri{background:var(--gold);color:#FFFFFF;border-color:var(--gold);font-weight:700}
.btn.pri:hover{background:var(--goldl);border-color:var(--goldl)}
.steps{display:flex;align-items:center;gap:0}
.step{display:flex;align-items:center;gap:0}
.sdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr2);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--mu);font-family:var(--fn);transition:all .2s;cursor:pointer}
.sdot.act{background:var(--gold);border-color:var(--gold);color:#FFFFFF}
.sdot.done{background:var(--grb);border-color:var(--gr);color:var(--gr)}
.sline{width:32px;height:2px;background:var(--bdr)}

/* ── UTILITIES ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:0 1px 3px rgba(15,45,82,0.06)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-family:var(--fn);font-size:11px;font-weight:700}
.lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.hdiv{height:1px;background:var(--bdr)}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadein{animation:fadein .3s ease forwards}

/* ── S1: PROFILE GRID ── */
.s1grid{display:grid;grid-template-columns:220px 1fr 300px;gap:12px;min-height:0}

/* persona card */
.pcard{display:flex;flex-direction:column;align-items:center;padding:18px 14px;gap:10px;text-align:center}
.ava{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fn);font-size:18px;font-weight:800;color:#FFFFFF;flex-shrink:0}
.pname{font-family:var(--fn);font-size:14px;font-weight:800;color:var(--navy);line-height:1.2}
.psub{font-size:10px;color:var(--mu);line-height:1.4;margin-top:2px}
.prow{width:100%;display:flex;justify-content:space-between;align-items:baseline}
.prl{font-size:10px;color:var(--mu)}
.prv{font-size:10px;font-weight:600;color:var(--navy);text-align:right;max-width:110px;line-height:1.3}

/* bureau panel */
.bpanel{padding:16px}
.bpanel-title{display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.b2grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 12px}
.bstat{display:flex;flex-direction:column;gap:2px}
.bstat-l{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu)}
.bstat-v{font-size:13px;font-weight:700;color:var(--navy);line-height:1.2}

/* revolver/transactor */
.rtrow{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 10px;border-radius:var(--r);border:1px solid}
.rt-ic{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rt-desc{font-size:10px;color:var(--mu);line-height:1.4}

/* credit history bar */
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hist-yr{font-size:9px;color:var(--mu);width:22px;flex-shrink:0}
.hist-track{flex:1;height:6px;border-radius:3px;background:var(--bg);overflow:hidden;position:relative;border:1px solid var(--bdr)}
.hist-fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.hist-tag{font-size:9px;font-weight:700;width:36px;flex-shrink:0;text-align:right}

/* score side */
.spanel{padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.drv-item{width:100%;display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.drv-item:last-child{border-bottom:none}
.drv-dot{width:5px;height:5px;border-radius:50%;margin-top:4px;flex-shrink:0}
.drv-txt{flex:1;font-size:10px;color:var(--mu);line-height:1.35}
.drv-pts{font-size:11px;font-weight:700;flex-shrink:0}

/* ── S2: INCOME ── */
.adj-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr)}
.adj-row:last-child{border-bottom:none}
.adj-txt{font-size:10px;color:var(--mu)}
.adj-val{font-size:11px;font-weight:700;font-family:var(--fm)}

/* ── S3: MATRIX + PRODUCTS ── */
.mx-cell{display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:10px;font-weight:600;padding:8px 5px;text-align:center;line-height:1.3;transition:all .2s;position:relative;cursor:default;border:1px solid transparent}
.mx-cell.hit{border-width:2px!important}
.prd-card{padding:12px 14px;display:flex;flex-direction:column;gap:6px;transition:all .15s}
.prd-card:hover{border-color:var(--navy2);box-shadow:0 2px 8px rgba(15,45,82,0.1)}
.prd-name{font-size:11px;font-weight:700;color:var(--navy);line-height:1.3}
.prd-desc{font-size:10px;color:var(--mu);line-height:1.35}
.prd-lim{font-family:var(--fn);font-size:15px;font-weight:800;margin-top:2px}

/* processing overlay */
#proc{position:absolute;inset:0;background:rgba(244,246,249,0.97);z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
#proc.on{display:flex}
.pline{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--surf);width:100%;max-width:500px;opacity:.3;transition:all .3s;box-shadow:0 1px 3px rgba(15,45,82,0.06)}
.pline.go{opacity:1;border-color:var(--gold);background:#FFFBF7}
.pline.dn{opacity:1;border-color:var(--gr);background:var(--grb)}
.pico{width:26px;height:26px;border-radius:5px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ptxt{flex:1;font-size:11px;font-weight:500;color:var(--navy)}
.pst{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--mu)}
.spinr{width:10px;height:10px;border:2px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
</style>
</head>

function getPersonaType(p){
  if(p.rtype==="ntc")return"NTC/Clean";
  if(p.rtype==="suspected")return"FRAUD";
  if(p.dem&&p.dem["Emp. Type"]&&p.dem["Emp. Type"].includes("Self"))return"Self-Employed";
  if(p.incNum>=100000)return"Salaried High";
  if(p.incNum>=50000)return"Salaried Mid";
  return"Salaried Entry";
}
function getPortfolioType(p){
  if(p.rtype==="ntc")return"Clean";
  const s=p.bureau.securedRatio;
  if(typeof s!=="number")return"Clean";
  if(s>=70)return"Sec";
  if(s>=30)return"Mix";
  return"Unsec";
}
function lookupTargetFoir(personaType,band,portfolioType){
  const pt=TARGET_FOIR[personaType];
  if(!pt)return null;
  const bd=pt[band];
  if(!bd)return null;
  return bd[portfolioType]??bd["Flat"]??bd["Clean"]??null;
}

function r3(p){
  const bi=BC[p.band];
  const rec=p.rec||{};
  const fmt=n=>n>0?'₹'+Math.round(n).toLocaleString('en-IN'):'—';
  const fmtp=n=>n!=null?n+'%':'—';
  const E=p.incNum||0;
  const O=p.bureau.activeEmiTotal||0;
  const curFoir=p.foir||0;

  // ── derived ──────────────────────────────────────────────────────────────
  const personaType=getPersonaType(p);
  const portfolioType=getPortfolioType(p);
  const targetFoir=lookupTargetFoir(personaType,p.band,portfolioType);
  const headroomEmi=targetFoir?Math.max(0,(targetFoir/100-curFoir/100)*E):0;
  const cashflow=targetFoir?Math.round((1-targetFoir/100)*E):Math.round(E*0.55);
  const lendFrac=LENDABLE_FRAC[p.eConf]||0.50;
  const lendable=Math.round(headroomEmi*lendFrac);
  const plOffer=Math.round(lendable*(LOAN_MULT[p.band]||20));
  const revMult=REVOLVER_MULT[p.band]||1.5;
  const ccNew=Math.round(lendable*revMult);
  const existCC=rec.existingCcLimit||0;
  const ccUpgrade=existCC>0&&ccNew>existCC*1.25;
  const foirColor=curFoir===null?'#64748B':curFoir<36?'#0D7A4E':curFoir<(targetFoir||60)?'#0369A1':curFoir<60?'#B45309':'#B91C1C';

  // ── CUSTOMER CATEGORY lookup ──────────────────────────────────────────────
  const CAT_MATRIX={
    A:{t1:'Standard',t2:'MassAff',t3:'Premium',t4:'Premium',t5:'Premium'},
    B:{t1:'Starter', t2:'Standard',t3:'MassAff',t4:'MassAff',t5:'Premium'},
    C:{t1:'Restricted',t2:'Starter',t3:'Standard',t4:'MassAff',t5:'MassAff'},
    D:{t1:'Restricted',t2:'Restricted',t3:'Starter',t4:'Standard',t5:'Standard'},
    NTC:{t1:'Starter',t2:'Starter',t3:'Standard',t4:'MassAff',t5:'Premium'},
    REJECT:{t1:'Rejected',t2:'Rejected',t3:'Rejected',t4:'Rejected',t5:'Rejected'},
  };
  function incTier(inc){
    if(inc<25000)return't1';
    if(inc<50000)return't2';
    if(inc<100000)return't3';
    if(inc<200000)return't4';
    return't5';
  }
  function getCategory(band,inc,emp){
    const tbl=CAT_MATRIX[band];
    if(!tbl)return'Rejected';
    let cat=tbl[incTier(inc)]||'Restricted';
    // SE step-down
    if(emp==='Self-Employed'&&cat!=='Rejected'){
      const order=['Rejected','Restricted','Starter','Standard','MassAff','Premium'];
      const idx=order.indexOf(cat);
      cat=idx>1?order[idx-1]:cat;
    }
    return cat;
  }
  const category=getCategory(p.band,E,p.dem&&p.dem['Emp. Type']&&p.dem['Emp. Type'].includes('Self')?'Self-Employed':'Salaried');
  const CAT_COLORS={Premium:'#C05B0A',MassAff:'#0369A1',Standard:'#5B21B6',Starter:'#0D7A4E',Restricted:'#B45309',Rejected:'#B91C1C'};
  const CAT_LABELS={Premium:'Premium',MassAff:'Mass Affluent',Standard:'Standard',Starter:'Starter',Restricted:'Restricted',Rejected:'Rejected'};
  const CAT_DESC={
    Premium:'Dedicated RM · Relationship pricing · Full product wallet',
    MassAff:'Digital-first · Shared RM pool · Broad product suite',
    Standard:'Self-serve · Branch · Core retail suite',
    Starter:'Digital onboarding · Auto-upgrade at Month 7',
    Restricted:'Account only · 6M review cycle · Clear upgrade path',
    Rejected:'Hard block · Branch visit for identity verification'
  };
  const catColor=CAT_COLORS[category]||'#64748B';
  const catLabel=CAT_LABELS[category]||category;
  const catDesc=CAT_DESC[category]||'';

  // ── PRODUCT ELIGIBILITY ───────────────────────────────────────────────────
  // [eligible, condition note]
  function prodElig(cat,hasHeadroom,lendAmt,cashflow,portfolioType,hasCC,emp,hasITR){
    const isSE=emp==='Self-Employed';
    const isMixSec=portfolioType==='Sec'||portfolioType==='Mix';
    const hw=lendAmt>0; // has headroom after lendable
    const cf1=cashflow>=100000, cf2=cashflow>=60000, cf3=cashflow>=30000, cf4=cashflow>=20000;

    const p_={};
    // Banking — always (unless Rejected)
    if(cat==='Rejected'){
      return {SA:'✗',CA:'✗',FD:'✗',SI:'✗',RD:'✗',CC:'✗',OD:'✗',PL:'✗',HL:'✗',AL:'✗',MF:'✗',INS:'✗',WM:'✗',PB:'✗'};
    }
    p_.SA=cat==='Restricted'?'Basic':cat==='Starter'?'Basic':cat==='Standard'?'Standard':'Premium';
    p_.CA=isSE&&cat!=='Restricted'?'✓ (SE/CA)':'—';
    p_.FD=cat!=='Restricted'&&cat!=='Starter'?'✓':'—';
    p_.SI=cat==='Premium'||cat==='MassAff'?'✓':'—';
    p_.RD=cat!=='Restricted'?'✓':'—';
    // Credit
    if(cat==='Restricted'){
      p_.CC='✗ No headroom';p_.OD='✗';p_.PL='✗';
    } else {
      // CC
      if(cat==='Premium')         p_.CC=hasHeadroom?'CC3/CC4 offer':'CC3 (no new headroom)';
      else if(cat==='MassAff')    p_.CC=hasHeadroom?(isMixSec?'CC2/CC3':'CC2'):'CC2 (no new headroom)';
      else if(cat==='Standard')   p_.CC=hasHeadroom&&isMixSec?'CC1/CC2':hasHeadroom?'CC1':'CC1 (subject to FOIR)';
      else if(cat==='Starter')    p_.CC=hasHeadroom?'CC1 (AA req)':'—';
      // OD
      p_.OD=isSE&&(cat==='Premium'||cat==='MassAff')&&isMixSec?'✓ Against property/FD':'—';
      // PL
      if(cat==='Premium')         p_.PL=hasHeadroom?'PL3'+(lendAmt>500000&&hasITR?' / PL4':''):'PL3 (if FOIR clears)';
      else if(cat==='MassAff')    p_.PL=hasHeadroom?'PL2/PL3':'PL2 (if FOIR clears)';
      else if(cat==='Standard')   p_.PL=hasHeadroom&&lendAmt>5000?'PL1/PL2':'PL1 (subject to FOIR)';
      else if(cat==='Starter')    p_.PL=hasHeadroom?'PL1 (AA+6M)':'—';
    }
    p_.HL=cat==='Premium'||cat==='MassAff'?'✓ Referral':'—';
    p_.AL=cat==='Premium'?'✓ Referral':'—';
    // Advisory
    p_.MF=cat==='Premium'||cat==='MassAff'?'✓':'—';
    p_.INS=cat==='Premium'||cat==='MassAff'?'✓ Full':cat==='Standard'?'✓ Basic term':'—';
    p_.WM=cat==='Premium'&&cf2?'✓':'—';
    p_.PB=cat==='Premium'&&cf1?'✓':'—';
    return p_;
  }
  const hasITR=p.incomeEng&&['ITR-Verified','Form16-Verified'].includes(p.incomeEng.method);
  const elig=prodElig(category,headroomEmi>0,lendable,cashflow,portfolioType,existCC>0,
    p.dem&&p.dem['Emp. Type']&&p.dem['Emp. Type'].includes('Self')?'Self-Employed':'Salaried',hasITR);

  // ── MATRIX ROWS/COLS ──────────────────────────────────────────────────────
  const personaRows=['Salaried High','Salaried Mid','Salaried Entry','Self-Employed','NTC/Clean'];
  const bandCols=['A','B','C','D'];
  function cellText(pt,band){
    const bd=TARGET_FOIR[pt];if(!bd)return'—';
    const bdata=bd[band];if(!bdata)return'Block';
    if(typeof bdata==='object'){
      const vals=Object.entries(bdata).filter(([k,v])=>v);
      return vals.map(([k,v])=>k+':'+v+'%').join(' / ');
    }
    return'—';
  }
  function catCell(band,tier,emp){
    const cat=getCategory(band,tier==='t1'?20000:tier==='t2'?35000:tier==='t3'?70000:tier==='t4'?140000:250000,emp);
    return cat;
  }

  // ── PRODUCT CARDS ─────────────────────────────────────────────────────────
  function buildProductCards(){
    if(p.band==='REJECT')return'<div style="padding:16px;text-align:center;border-radius:8px;background:rgba(185,28,28,0.06);border:1px solid rgba(185,28,28,0.2)"><div style="font-size:22px;margin-bottom:8px">⛔</div><div style="font-size:12px;font-weight:700;color:#B91C1C">Fraud Override</div><div style="font-size:9px;color:var(--mu);margin-top:5px">Branch visit for identity verification.</div></div>';
    let html='';
    // FOIR numbers strip
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">'+
      [['Current FOIR',fmtp(curFoir),foirColor,'EMI÷income'],
       ['Target FOIR',fmtp(targetFoir),catColor,personaType+' · '+p.band],
       ['Headroom',headroomEmi>0?fmtp(Math.round((targetFoir||0)-curFoir)):headroomEmi===0&&targetFoir&&curFoir<targetFoir?'0%':'None',headroomEmi>0?'#0D7A4E':'#B45309',headroomEmi>0?fmt(headroomEmi)+'/mo':'No new credit']
      ].map(([l,v,c,s])=>'<div style="padding:8px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--bdr);text-align:center">'+
        '<div style="font-size:8px;color:var(--mu);font-weight:600;margin-bottom:3px">'+l+'</div>'+
        '<div style="font-family:var(--fn);font-size:18px;font-weight:800;color:'+c+'">'+v+'</div>'+
        '<div style="font-size:8px;color:var(--mu);margin-top:1px;line-height:1.2">'+s+'</div>'+
      '</div>').join('')+
    '</div>';

    // FOIR bar
    html+='<div style="position:relative;height:8px;border-radius:4px;background:linear-gradient(to right,#0D7A4E 0%,#0369A1 36%,#B45309 56%,#B91C1C 76%);margin-bottom:12px">'+
      (targetFoir?'<div style="position:absolute;top:-3px;left:'+Math.min(targetFoir,100)+'%;transform:translateX(-50%);width:2px;height:14px;background:#0369A1;border-radius:1px;opacity:.8"></div>':'')+
      (curFoir!==null?'<div style="position:absolute;top:-4px;left:'+Math.min(curFoir,100)+'%;transform:translateX(-50%);width:3px;height:16px;background:'+foirColor+';border-radius:2px;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>':'')+
    '</div>';

    // Available cashflow callout
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">'+
      '<div style="padding:8px 10px;border-radius:6px;background:rgba(13,122,78,0.06);border:1px solid rgba(13,122,78,0.18)">'+
        '<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:3px">Available Cashflow</div>'+
        '<div style="font-family:var(--fn);font-size:16px;font-weight:800;color:#0D7A4E">'+fmt(cashflow)+'</div>'+
        '<div style="font-size:8px;color:var(--mu);margin-top:1px">/mo after obligations</div>'+
      '</div>'+
      '<div style="padding:8px 10px;border-radius:6px;background:rgba(3,105,161,0.06);border:1px solid rgba(3,105,161,0.18)">'+
        '<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:3px">Lendable Headroom</div>'+
        '<div style="font-family:var(--fn);font-size:16px;font-weight:800;color:#0369A1">'+fmt(lendable)+'</div>'+
        '<div style="font-size:8px;color:var(--mu);margin-top:1px">/mo ('+Math.round(lendFrac*100)+'% of headroom)</div>'+
      '</div>'+
    '</div>';

    // Credit products
    if(headroomEmi>0&&lendable>0){
      html+='<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:5px">Credit Offers</div>'+
      '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px">';
      if(ccNew>0){
        const ccLabel=ccUpgrade?'CC Upgrade → '+fmt(ccNew):existCC>0?'Credit Card: '+fmt(existCC):'New Credit Card: '+fmt(ccNew);
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-radius:6px;background:rgba(244,123,32,0.07);border:1px solid rgba(244,123,32,0.20)">'+
          '<div><div style="font-size:9px;font-weight:700;color:var(--navy)">💳 '+ccLabel+'</div>'+
          '<div style="font-size:8px;color:var(--mu);margin-top:1px">'+fmt(lendable)+'/mo × '+revMult+'× revolving multiplier</div></div>'+
          '<div style="font-size:8px;font-weight:700;color:#F47B20">'+elig.CC+'</div>'+
        '</div>';
      }
      if(plOffer>0){
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-radius:6px;background:rgba(29,78,216,0.06);border:1px solid rgba(29,78,216,0.18)">'+
          '<div><div style="font-size:9px;font-weight:700;color:var(--navy)">📋 Pre-approved Loan: '+fmt(plOffer)+'</div>'+
          '<div style="font-size:8px;color:var(--mu);margin-top:1px">'+fmt(lendable)+' × '+(LOAN_MULT[p.band]||20)+'× (Band '+p.band+', 36M, 12%) · 30-day offer</div></div>'+
          '<div style="font-size:8px;font-weight:700;color:#1D4ED8">'+elig.PL+'</div>'+
        '</div>';
      }

// ─────────────────────────────────────────────────────────────────────────────
// PROCESSING ANIMATION
// ─────────────────────────────────────────────────────────────────────────────
function runProc(p,onDone){
  const proc=document.getElementById("proc");
  const lines=[
    ["🔗","Credit bureau pull (CIBIL / Experian / CRIF)"],
    ["🏦","Account Aggregator — bank statement & UPI data"],
    ["🔍","Datasutram fraud intelligence — identity & velocity"],
    ["💡","Income Estimation Engine — EMI-back · bureau signals"],
    ["📊","Credit Risk Scoring — 4 pillars · FOIR · override check"]
  ];
  document.getElementById("proc-name").textContent=p.name;
  document.getElementById("plines").innerHTML=lines.map((_,i)=>`
    <div class="pline" id="pl${i}">
      <div class="pico">${lines[i][0]}</div>
      <div class="ptxt">${lines[i][1]}</div>
      <div class="pst" id="ps${i}" style="color:var(--mu)">Queued</div>
    </div>`).join('');
  document.getElementById("pdone").style.opacity="0";
  proc.classList.add("on");
  tms.forEach(t=>clearTimeout(t));tms=[];
  const go=[0,380,800,1300,1870];
  const ok=[280,660,1100,1650,2250];
  lines.forEach((_,i)=>{
    tms.push(setTimeout(()=>{
      const el=document.getElementById("pl"+i),st=document.getElementById("ps"+i);
      if(!el)return;el.classList.add("go");
      st.innerHTML=`<span class="spinr"></span>`;st.style.color="var(--gold)";
    },go[i]));
    tms.push(setTimeout(()=>{
      const el=document.getElementById("pl"+i),st=document.getElementById("ps"+i);
      if(!el)return;el.classList.remove("go");el.classList.add("dn");
      st.textContent="Done ✓";st.style.color="var(--gr)";
    },ok[i]));
  });
  tms.push(setTimeout(()=>{document.getElementById("pdone").style.opacity="1";},2500));
  tms.push(setTimeout(()=>{proc.classList.remove("on");onDone();},3100));
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function goTo(n){
  document.querySelectorAll(".screen").forEach((el,i)=>el.classList.toggle("act",i===n));
  CS=n;upd();
}
function nav(d){
  const n=CS+d;
  if(n<0||n>2)return;
  if(CS===0&&n===1){
    runProc(P[CP],()=>{r2(P[CP]);goTo(1);});
  } else if(CS===1&&n===2){
    r3(P[CP]);goTo(2);
  } else if(n>=0&&n<=2){
    goTo(n);
  }
}
function selP(i){
  CP=i;
  document.querySelectorAll(".pp").forEach((el,j)=>el.classList.toggle("act",j===i));
  r1(P[CP]);
  if(CS===1){r2(P[CP]);}
  if(CS===2){r3(P[CP]);}
  document.getElementById("steplbl").textContent=STEPS[CS];
}
function upd(){
  const bp=document.getElementById("bprev"),bn=document.getElementById("bnext");
  bp.disabled=CS===0;
  if(CS===0){bn.textContent="Run Income Engine →";}
  else if(CS===1){bn.textContent="View Recommendations →";}
  else{bn.textContent="Restart ↺";bn.onclick=()=>{goTo(0);};}
  if(CS<2)bn.onclick=()=>nav(1);
  document.getElementById("steplbl").textContent=STEPS[CS];
  document.querySelectorAll(".sdot").forEach((el,i)=>{
    el.classList.toggle("act",i===CS);
    el.classList.toggle("done",i<CS);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById("ppills").innerHTML=P.map((p,i)=>
  `<button class="pp ${i===0?"act":""}" onclick="selP(${i})">${p.name.split(" ")[0]}</button>`).join('');

document.getElementById("steps").innerHTML=STEPS.map((s,i)=>`
  <div class="step">
    ${i>0?'<div class="sline"></div>':''}
    <div class="sdot ${i===0?"act":""}" onclick="if(${i}<=CS)goTo(${i})" title="${s}">${i+1}</div>
  </div>`).join('');

r1(P[0]);upd();

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" ")nav(1);
  if(e.key==="ArrowLeft")nav(-1);
  P.forEach((_,i)=>{if(e.key===(i+1).toString())selP(i);});
});
</script>
