<html lang="en">

<title>Knight Fintech · CASA Intelligence Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Knight Fintech — light theme: white bg, navy text, orange accent */
  --bg:#F4F6F9;--surf:#FFFFFF;--card:#FFFFFF;--card2:#F8F9FC;
  --bdr:#E2E8F0;--bdr2:#CBD5E1;
  --navy:#0F2D52;--navy2:#1A3F70;
  --gold:#F47B20;--goldl:#FF9245;--goldb:rgba(244,123,32,0.09);--goldbl:rgba(244,123,32,0.16);
  --tx:#0F2D52;--mu:#64748B;--di:#CBD5E1;
  --gr:#0D7A4E;--grb:rgba(13,122,78,0.08);
  --tl:#0369A1;--tlb:rgba(3,105,161,0.08);
  --am:#B45309;--amb:rgba(180,83,9,0.08);
  --re:#B91C1C;--reb:rgba(185,28,28,0.08);
  --pu:#5B21B6;--pub:rgba(91,33,182,0.08);
  --bl:#1D4ED8;--blb:rgba(29,78,216,0.08);
  --fn:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:8px;--rl:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:13px;line-height:1.5}
#app{position:relative;height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{height:52px;border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--navy);flex-shrink:0;gap:14px}
.logo{font-family:var(--fn);font-weight:800;font-size:11px;color:#FFFFFF;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px;white-space:nowrap}
.lgem{width:16px;height:16px;background:var(--gold);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);flex-shrink:0}
.logo-sep{width:1px;height:20px;background:rgba(15,45,82,0.14)}
.ppills{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.ppills::-webkit-scrollbar{display:none}
.pp{cursor:pointer;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.55);background:transparent;border:1px solid rgba(15,45,82,0.12);transition:all .15s;white-space:nowrap;font-family:var(--fb)}
.pp:hover{border-color:rgba(255,255,255,0.4);color:#FFF}
.pp.act{background:var(--gold);border-color:var(--gold);color:#FFFFFF}
.steplbl{font-size:9px;font-family:var(--fn);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);white-space:nowrap}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .25s ease;display:flex;flex-direction:column}
.screen.act{opacity:1;pointer-events:all}
.scrl{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.scrl::-webkit-scrollbar{width:3px}
.scrl::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── FOOTER ── */
#ftr{height:50px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--surf);flex-shrink:0;box-shadow:0 -1px 0 var(--bdr)}
.btn{cursor:pointer;padding:8px 18px;border-radius:var(--r);font-size:11px;font-weight:600;border:1px solid var(--bdr2);background:var(--surf);color:var(--mu);transition:all .15s;font-family:var(--fb);display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg);border-color:var(--navy);color:var(--navy)}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn.pri{background:var(--gold);color:#FFFFFF;border-color:var(--gold);font-weight:700}
.btn.pri:hover{background:var(--goldl);border-color:var(--goldl)}
.steps{display:flex;align-items:center;gap:0}
.step{display:flex;align-items:center;gap:0}
.sdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr2);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--mu);font-family:var(--fn);transition:all .2s;cursor:pointer}
.sdot.act{background:var(--gold);border-color:var(--gold);color:#FFFFFF}
.sdot.done{background:var(--grb);border-color:var(--gr);color:var(--gr)}
.sline{width:32px;height:2px;background:var(--bdr)}

/* ── UTILITIES ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:0 1px 3px rgba(15,45,82,0.06)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-family:var(--fn);font-size:11px;font-weight:700}
.lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.hdiv{height:1px;background:var(--bdr)}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadein{animation:fadein .3s ease forwards}

/* ── S1: PROFILE GRID ── */
.s1grid{display:grid;grid-template-columns:220px 1fr 300px;gap:12px;min-height:0}

/* persona card */
.pcard{display:flex;flex-direction:column;align-items:center;padding:18px 14px;gap:10px;text-align:center}
.ava{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fn);font-size:18px;font-weight:800;color:#FFFFFF;flex-shrink:0}
.pname{font-family:var(--fn);font-size:14px;font-weight:800;color:var(--navy);line-height:1.2}
.psub{font-size:10px;color:var(--mu);line-height:1.4;margin-top:2px}
.prow{width:100%;display:flex;justify-content:space-between;align-items:baseline}
.prl{font-size:10px;color:var(--mu)}
.prv{font-size:10px;font-weight:600;color:var(--navy);text-align:right;max-width:110px;line-height:1.3}

/* bureau panel */
.bpanel{padding:16px}
.bpanel-title{display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.b2grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 16px}
.bstat{display:flex;flex-direction:column;gap:2px}
.bstat-l{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu)}
.bstat-v{font-size:13px;font-weight:700;color:var(--navy);line-height:1.2}

/* revolver/transactor */
.rtrow{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 10px;border-radius:var(--r);border:1px solid}
.rt-ic{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rt-desc{font-size:10px;color:var(--mu);line-height:1.4}

/* credit history bar */
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hist-yr{font-size:9px;color:var(--mu);width:22px;flex-shrink:0}
.hist-track{flex:1;height:6px;border-radius:3px;background:var(--bg);overflow:hidden;position:relative;border:1px solid var(--bdr)}
.hist-fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.hist-tag{font-size:9px;font-weight:700;width:36px;flex-shrink:0;text-align:right}

/* score side */
.spanel{padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.drv-item{width:100%;display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.drv-item:last-child{border-bottom:none}
.drv-dot{width:5px;height:5px;border-radius:50%;margin-top:4px;flex-shrink:0}
.drv-txt{flex:1;font-size:10px;color:var(--mu);line-height:1.35}
.drv-pts{font-size:11px;font-weight:700;flex-shrink:0}

/* ── S2: INCOME ── */
.adj-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr)}
.adj-row:last-child{border-bottom:none}
.adj-txt{font-size:10px;color:var(--mu)}
.adj-val{font-size:11px;font-weight:700;font-family:var(--fm)}

/* ── S3: MATRIX + PRODUCTS ── */
.mx-cell{display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:10px;font-weight:600;padding:8px 5px;text-align:center;line-height:1.3;transition:all .2s;position:relative;cursor:default;border:1px solid transparent}
.mx-cell.hit{border-width:2px!important}
.prd-card{padding:12px 14px;display:flex;flex-direction:column;gap:6px;transition:all .15s}
.prd-card:hover{border-color:var(--navy2);box-shadow:0 2px 8px rgba(15,45,82,0.1)}
.prd-name{font-size:11px;font-weight:700;color:var(--navy);line-height:1.3}
.prd-desc{font-size:10px;color:var(--mu);line-height:1.35}
.prd-lim{font-family:var(--fn);font-size:15px;font-weight:800;margin-top:2px}

/* processing overlay */
#proc{position:absolute;inset:0;background:rgba(244,246,249,0.97);z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
#proc.on{display:flex}
.pline{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--surf);width:100%;max-width:500px;opacity:.3;transition:all .3s;box-shadow:0 1px 3px rgba(15,45,82,0.06)}
.pline.go{opacity:1;border-color:var(--gold);background:#FFFBF7}
.pline.dn{opacity:1;border-color:var(--gr);background:var(--grb)}
.pico{width:26px;height:26px;border-radius:5px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ptxt{flex:1;font-size:11px;font-weight:500;color:var(--navy)}
.pst{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--mu)}
.spinr{width:10px;height:10px;border:2px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
</style>
</head>

    ["NTC/Basic","Basic only","Basic only","Rejected"]
  ];

  // determine row/col highlight
  const rBandIdx={A:0,B:1,C:2,D:3,NTC:-1,REJECT:-1}[p.band];
  const incIdx=p.incNum>=100000?0:p.incNum>=50000?1:p.incNum>=25000?2:3;

  const cellColor=c=>({
    "Premium":"rgba(201,151,58,0.12)","Standard":"rgba(124,58,237,0.1)",
    "Cautious":"rgba(217,119,6,0.1)","Restricted":"rgba(220,38,38,0.08)",
    "Rejected":"rgba(220,38,38,0.12)","NTC/Basic":"rgba(124,58,237,0.08)","Basic only":"rgba(90,112,153,0.08)"
  }[c]||"rgba(90,112,153,0.06)");
  const cellTxt=c=>({
    "Premium":"#F47B20","Standard":"#6E56CF","Cautious":"#D97706",
    "Restricted":"#DC3545","Rejected":"#DC3545","NTC/Basic":"#6E56CF","Basic only":"#5B7A9D"
  }[c]||"#5B7A9D");

  document.getElementById("s3c").innerHTML=`
<div style="display:grid;grid-template-columns:1fr 300px;gap:12px;fadein" class="fadein">
  <div style="display:flex;flex-direction:column;gap:12px">

    <!-- Matrix -->
    <div class="card" style="padding:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:6px;height:6px;border-radius:50%;background:${bi.c}"></div>
          <span class="lbl">Decision Matrix — Income Band × Risk Band</span>
        </div>
        <div style="font-size:10px;color:var(--mu)">Highlighted cell = <span style="color:${bi.c};font-weight:600">${p.name}</span></div>
      </div>
      <div style="display:grid;grid-template-columns:100px repeat(4,1fr);gap:5px;align-items:center">
        <!-- Header row -->
        <div style="font-size:9px;color:var(--di)">Income ↓ / Risk →</div>
        ${riskBands.map((r,i)=>`<div style="text-align:center;font-size:9px;font-weight:700;color:${i===rBandIdx?bi.c:'var(--mu)'};padding:4px 0;border-radius:4px;background:${i===rBandIdx?bi.bg:'transparent'}">${r}</div>`).join('')}
        <!-- Data rows -->
        ${incBands.map((ib,ri)=>`
          <div style="font-size:9px;color:${ri===incIdx?'var(--tx)':'var(--mu)'};font-weight:${ri===incIdx?600:400};line-height:1.3;padding-right:4px">${ib.replace('\n','<br>')}</div>
          ${matrix[ri].map((cat,ci)=>{
            const hit=ri===incIdx&&ci===rBandIdx;
            return`<div class="mx-cell ${hit?'hit':''}" style="background:${hit?bi.bg:cellColor(cat)};color:${hit?bi.c:cellTxt(cat)};border:${hit?`1.5px solid ${bi.c}`:`1px solid ${cellColor(cat)}`};font-size:${hit?'11px':'9px'};font-weight:${hit?700:500}">${hit?`<div style="position:absolute;inset:0;border-radius:4px;background:${bi.c};opacity:.05"></div>`:''}<span>${cat}</span></div>`;
          }).join('')}
        `).join('')}
      </div>
      ${p.band==="NTC"||p.band==="REJECT"?`<div style="margin-top:10px;padding:8px 12px;border-radius:6px;background:${bi.bg};border:1px solid ${bi.c}40;font-size:10px;color:${bi.c}">${p.band==="NTC"?"NTC path active — standard matrix bypassed. Alternate scoring via Account Aggregator.":"Fraud override active — matrix bypassed. Hard reject applied."}</div>`:``}
    </div>

    <!-- Product cards -->
    <div class="card" style="padding:16px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)">
        <div style="width:6px;height:6px;border-radius:50%;background:#F47B20"></div>
        <span class="lbl">Recommended Products — ${p.name}</span>
        <span class="tag" style="background:${catC[p.category]+'18'};color:${catC[p.category]};margin-left:auto">${p.category}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px">
        ${p.products.map(pr=>{
          const t=TC[pr.t];
          return`<div class="card prd-card" style="border-color:${t.c}22">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
              <div class="prd-ico" style="background:${t.bg}">${pr.i}</div>
              <div class="tag" style="background:${t.bg};color:${t.c};font-size:8px">${pr.t.toUpperCase()}</div>
            </div>
            <div class="prd-name">${pr.n}</div>
            <div class="prd-desc">${pr.d}</div>
            ${pr.lim?`<div class="prd-lim" style="color:${t.c}">${pr.lim}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <!-- RIGHT: Decision summary -->
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="card" style="padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <div class="lbl">Final Decision</div>
      ${scoreBlock(p,true)}
      <div style="text-align:center;font-family:var(--fn);font-size:12px;font-weight:700;color:${bi.c};line-height:1.3;padding:8px 12px;background:${bi.bg};border:1px solid ${bi.c}30;border-radius:6px;width:100%">${p.dec}</div>
    </div>

    <div class="card" style="padding:14px 16px">
      <div class="lbl" style="margin-bottom:8px">Decision Basis</div>
      ${[
        ["Score",p.score??'Override',bi.c],
        ["Band",p.band,bi.c],
        ["Income",p.eInc.length>18?p.eInc.slice(0,18)+'…':p.eInc,"var(--tx)"],
        ["FOIR",p.foir!==null?p.foir+'%':'N/A',p.foir===null?'#64748B':p.foir<36?'#0D7A4E':p.foir<51?'#0369A1':p.foir<61?'#B45309':'#B91C1C'],
        ["Fraud",p.fraud,FC[p.fraud]],
        ["Category",p.category,"var(--tx)"]
      ].map(([l,v,c])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)">
        <span style="font-size:10px;color:var(--mu)">${l}</span>
        <span style="font-size:11px;font-weight:700;color:${c};font-family:var(--fm);max-width:120px;text-align:right;line-height:1.3">${v}</span>
      </div>`).join('')}
    </div>

    <div class="card" style="padding:14px;display:flex;flex-direction:column;gap:6px">
      <div class="lbl" style="margin-bottom:4px">Narrator Notes</div>
      <div style="font-size:10px;color:var(--mu);line-height:1.55">${p.narr}</div>
    </div>
  </div>
</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// PROCESSING ANIMATION
// ─────────────────────────────────────────────────────────────────────────────
function runProc(p,onDone){
  const proc=document.getElementById("proc");
  const lines=[
    ["🔗","Credit bureau pull (CIBIL / Experian / CRIF)"],
    ["🏦","Account Aggregator — bank statement & UPI data"],
    ["🔍","Datasutram fraud intelligence — identity & velocity"],
    ["💡","Income Estimation Engine — EMI-back · declared · proxy"],
    ["📊","Credit Risk Scoring — 4 pillars · FOIR · override check"]
  ];
  document.getElementById("proc-name").textContent=p.name;
  document.getElementById("plines").innerHTML=lines.map((_,i)=>`
    <div class="pline" id="pl${i}">
      <div class="pico">${lines[i][0]}</div>
      <div class="ptxt">${lines[i][1]}</div>
      <div class="pst" id="ps${i}" style="color:var(--mu)">Queued</div>
    </div>`).join('');
  document.getElementById("pdone").style.opacity="0";
  proc.classList.add("on");
  tms.forEach(t=>clearTimeout(t));tms=[];
  const go=[0,380,800,1300,1870];
  const ok=[280,660,1100,1650,2250];
  lines.forEach((_,i)=>{
    tms.push(setTimeout(()=>{
      const el=document.getElementById("pl"+i),st=document.getElementById("ps"+i);
      if(!el)return;el.classList.add("go");
      st.innerHTML=`<span class="spinr"></span>`;st.style.color="var(--gold)";
    },go[i]));
    tms.push(setTimeout(()=>{
      const el=document.getElementById("pl"+i),st=document.getElementById("ps"+i);
      if(!el)return;el.classList.remove("go");el.classList.add("dn");
      st.textContent="Done ✓";st.style.color="var(--gr)";
    },ok[i]));
  });
  tms.push(setTimeout(()=>{document.getElementById("pdone").style.opacity="1";},2500));
  tms.push(setTimeout(()=>{proc.classList.remove("on");onDone();},3100));
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function goTo(n){
  document.querySelectorAll(".screen").forEach((el,i)=>el.classList.toggle("act",i===n));
  CS=n;upd();
}
function nav(d){
  const n=CS+d;
  if(n<0||n>2)return;
  if(CS===0&&n===1){
    runProc(P[CP],()=>{r2(P[CP]);goTo(1);});
  } else if(CS===1&&n===2){
    r3(P[CP]);goTo(2);
  } else if(n>=0&&n<=2){
    goTo(n);
  }
}
function selP(i){
  CP=i;
  document.querySelectorAll(".pp").forEach((el,j)=>el.classList.toggle("act",j===i));
  r1(P[CP]);
  if(CS===1){r2(P[CP]);}
  if(CS===2){r3(P[CP]);}
  document.getElementById("steplbl").textContent=STEPS[CS];
}
function upd(){
  const bp=document.getElementById("bprev"),bn=document.getElementById("bnext");
  bp.disabled=CS===0;
  if(CS===0){bn.textContent="Run Income Engine →";}
  else if(CS===1){bn.textContent="View Decision & Products →";}
  else{bn.textContent="Restart ↺";bn.onclick=()=>{goTo(0);};}
  if(CS<2)bn.onclick=()=>nav(1);
  document.getElementById("steplbl").textContent=STEPS[CS];
  document.querySelectorAll(".sdot").forEach((el,i)=>{
    el.classList.toggle("act",i===CS);
    el.classList.toggle("done",i<CS);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById("ppills").innerHTML=P.map((p,i)=>
  `<button class="pp ${i===0?"act":""}" onclick="selP(${i})">${p.name.split(" ")[0]}</button>`).join('');

document.getElementById("steps").innerHTML=STEPS.map((s,i)=>`
  <div class="step">
    ${i>0?'<div class="sline"></div>':''}
    <div class="sdot ${i===0?"act":""}" onclick="if(${i}<=CS)goTo(${i})" title="${s}">${i+1}</div>
  </div>`).join('');

r1(P[0]);upd();

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" ")nav(1);
  if(e.key==="ArrowLeft")nav(-1);
  P.forEach((_,i)=>{if(e.key===(i+1).toString())selP(i);});
});
</script>
</body>
</html>
